<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>適正年収・市場価値診断 2025 - Career Metrics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // ==========================================
        // 1. あなた専用のFirebase設定
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB7gmoM4rVGRK2BE5TBDNAht-OrCO6PSss",
            authDomain: "career-check-app.firebaseapp.com",
            projectId: "career-check-app",
            storageBucket: "career-check-app.firebasestorage.app",
            messagingSenderId: "967432103534",
            appId: "1:967432103534:web:1a3c643838fcd40f0de87f",
            measurementId: "G-0HW8JVMTEE"
        };

        const appId = 'career-check-2025-report-v1'; 
        const BASE_COUNT = 6421; 

        const state = {
            user: null, gender: '', age: 0, exp: 0, job: '', salary: 0, mgmt: 0, resultVal: 0, communityAvg: 610, communityCount: BASE_COUNT
        };

        let charts = { gap: null, radar: null };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 匿名認証と訪問ログの記録
        signInAnonymously(auth).catch(e => console.error("Auth Error:", e));

        onAuthStateChanged(auth, async (user) => {
            state.user = user;
            if (user) {
                syncDatabase();
                // 【計測1】サイト訪問（VISIT）を記録
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                        type: 'VISIT',
                        createdAt: serverTimestamp()
                    });
                } catch (e) { console.error("Visit Log Error:", e); }
            }
        });

        function syncDatabase() {
            if (!auth.currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            onSnapshot(colRef, (snap) => {
                let count = 0;
                snap.forEach(doc => { if (doc.data().type === 'DIAGNOSIS') count++; });
                state.communityCount = count + BASE_COUNT;
                const el = document.getElementById('stat-count');
                if (el) el.innerText = state.communityCount.toLocaleString();
            });
        }

        // 診断実行とデータ保存
        async function runDiagnostic(e) {
            e.preventDefault();
            if (!auth.currentUser) return;

            state.gender = document.querySelector('input[name="gender"]:checked').value;
            state.age = parseInt(document.getElementById('age').value);
            state.exp = parseFloat(document.getElementById('exp').value);
            state.job = document.getElementById('job').value;
            state.salary = parseInt(document.getElementById('salary').value);
            state.mgmt = parseInt(document.querySelector('input[name="mgmt"]:checked').value);

            showScreen('screen-loading');

            // 計算ロジック
            const medians = { 23: 340, 27: 430, 32: 520, 37: 620, 45: 750 };
            let base = medians[state.age] || 500;
            const multipliers = { sales: 1.05, engineer: 1.25, creative: 1.1, admin: 0.9, other: 1.0 };
            let factor = (multipliers[state.job] || 1.0) * state.exp;
            if (state.mgmt === 1) factor *= 1.15; 
            state.resultVal = Math.round((base * factor * (0.97 + Math.random() * 0.05)) / 10) * 10;

            // 【計測2】診断完了（DIAGNOSIS）を詳細データと共に記録
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                    type: 'DIAGNOSIS',
                    age: state.age,    // 23, 27など詳細な数値
                    job: state.job,
                    marketValue: state.resultVal,
                    salary: state.salary,
                    createdAt: serverTimestamp()
                });
            } catch (e) { console.error("Diagnosis Log Error:", e); }

            setTimeout(() => {
                displayResults();
                showScreen('screen-result');
            }, 2000);
        }

        // LINEボタンのクリック計測
        window.trackLineClick = async () => {
            if (!auth.currentUser) return;
            try {
                // 【計測3】LINEクリック（LINE_CLICK）を記録
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                    type: 'LINE_CLICK',
                    createdAt: serverTimestamp()
                });
                window.open("https://lin.ee/OCtRagy", "_blank");
            } catch (e) { 
                console.error("Line Click Error:", e);
                window.open("https://lin.ee/OCtRagy", "_blank"); // エラーでも遷移はさせる
            }
        };

        function displayResults() {
            document.getElementById('res-val').innerText = state.resultVal.toLocaleString();
            const diff = state.resultVal - state.salary;
            const badge = document.getElementById('res-badge');
            const adviceEl = document.getElementById('res-advice');
            if (diff > 80) {
                badge.innerText = "📈 市場価値が先行しています";
                badge.className = "px-4 py-1.5 rounded-full bg-orange-500 text-white text-[10px] font-black";
                adviceEl.innerHTML = `現在、${diff}万円前後の上積みが狙える求人が多く存在します。`;
            } else {
                badge.innerText = "✅ 理想的な評価バランス";
                badge.className = "px-4 py-1.5 rounded-full bg-blue-600 text-white text-[10px] font-black";
                adviceEl.innerHTML = `能力と報酬のバランスが良好です。`;
            }
            renderCharts();
        }

        function renderCharts() {
            if (charts.gap) charts.gap.destroy();
            charts.gap = new Chart(document.getElementById('chartGap').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: [['現在', '年収'], ['適正', '年収']],
                    datasets: [{ data: [state.salary, state.resultVal], backgroundColor: ['#E2E8F0', '#2563EB'], borderRadius: 12 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        window.showScreen = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            window.scrollTo(0,0);
        };
        window.runDiagnostic = runDiagnostic;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #F8FAFC; color: #1E293B; }
        .hidden-section { display: none; }
        .chart-container { position: relative; height: 260px; width: 100%; }
        .line-green { background-color: #06C755; }
        input[type="radio"]:checked + div { border-color: #2563EB; background-color: #EFF6FF; color: #2563EB; }
    </style>
</head>
<body class="antialiased">
<div id="app" class="max-w-xl mx-auto min-h-screen bg-white shadow-2xl relative flex flex-col border-x border-slate-100">
    <section id="screen-start" class="flex-grow flex flex-col items-center justify-center p-8 text-center space-y-12 py-16">
        <div class="space-y-4">
            <div class="inline-flex items-center px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest">Market Analysis Lab | 2025</div>
            <h1 class="text-4xl font-black leading-[1.1] tracking-tight">あなたの<br><span class="text-blue-600">本当の市場価値</span>を<br>精密に診断する</h1>
        </div>
        <div class="w-full space-y-6">
            <button onclick="showScreen('screen-form')" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2.5rem] text-xl shadow-2xl shadow-blue-600/30 active:scale-95 transition-all">診断を開始（無料）</button>
            <div class="p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100 space-y-2">
                <p class="text-[11px] text-slate-400 font-black uppercase tracking-widest">Diagnostic Statistics</p>
                <p class="text-4xl font-black text-slate-800"><span id="stat-count">----</span><span class="text-sm ml-1 opacity-40">件</span></p>
            </div>
        </div>
    </section>

    <section id="screen-form" class="hidden-section flex-grow p-8 py-10 space-y-8">
        <h2 class="text-2xl font-black">キャリア情報入力</h2>
        <form onsubmit="runDiagnostic(event)" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">01. Gender</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="gender" value="male" class="hidden peer" required><div class="p-3 text-center text-xs font-bold border-2 border-slate-100 rounded-xl transition-all">男性</div></label>
                    <label class="cursor-pointer"><input type="radio" name="gender" value="female" class="hidden peer"><div class="p-3 text-center text-xs font-bold border-2 border-slate-100 rounded-xl transition-all">女性</div></label>
                    <label class="cursor-pointer"><input type="radio" name="gender" value="other" class="hidden peer"><div class="p-3 text-center text-xs font-bold border-2 border-slate-100 rounded-xl transition-all">無回答</div></label>
                </div>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">02. Age</label>
                <select id="age" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
                    <option value="" disabled selected>年齢を選択</option><option value="23">20代前半</option><option value="27">20代後半</option><option value="32">30代前半</option><option value="37">30代後半</option><option value="45">40代以上</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">03. Experience</label>
                <select id="exp" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
                    <option value="" disabled selected>職歴を選択</option>
                    <option value="0.85">1年未満</option>
                    <option value="1.0">1〜3年</option>
                    <option value="1.15">3〜5年</option>
                    <option value="1.25">5〜10年</option>
                    <option value="1.35">10年以上</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">04. Job Category</label>
                <select id="job" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
                    <option value="" disabled selected>職種を選択</option><option value="sales">営業・コンサル</option><option value="engineer">エンジニア・技術職</option><option value="creative">企画・マーケ・クリエイティブ</option><option value="admin">事務・管理部門</option><option value="other">その他</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">05. Current Salary</label>
                <select id="salary" required class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl focus:border-blue-600 outline-none transition-all">
                    <option value="" disabled selected>現在の年収を選択</option><option value="320">〜350万円</option><option value="450">350〜550万円</option><option value="650">550〜750万円</option><option value="850">750〜1000万円</option><option value="1200">1000万円以上</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">06. Management</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer"><input type="radio" name="mgmt" value="0" class="hidden peer" required><div class="p-4 text-center font-bold border-2 border-slate-100 rounded-2xl transition-all">非管理職</div></label>
                    <label class="cursor-pointer"><input type="radio" name="mgmt" value="1" class="hidden peer"><div class="p-4 text-center font-bold border-2 border-slate-100 rounded-2xl transition-all">管理職</div></label>
                </div>
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2.5rem] text-xl mt-4 shadow-xl active:scale-95 transition-all">診断レポートを表示</button>
        </form>
    </section>

    <section id="screen-loading" class="hidden-section flex-grow flex flex-col items-center justify-center p-8 space-y-6">
        <div class="relative w-24 h-24"><div class="absolute inset-0 border-8 border-slate-100 rounded-full"></div><div class="absolute inset-0 border-8 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>
    </section>

    <section id="screen-result" class="hidden-section flex-grow pb-24 overflow-y-auto bg-slate-50">
        <div class="bg-slate-900 text-white p-10 pt-16 rounded-b-[4.5rem] text-center space-y-4">
            <div id="res-badge" class="inline-block px-4 py-2 rounded-full text-[10px] font-black uppercase bg-white/10"></div>
            <div class="flex items-baseline justify-center"><span id="res-val" class="text-7xl font-black">---</span><span class="text-2xl font-bold ml-2">万円</span></div>
            <p id="res-advice" class="text-xs text-white/80 italic"></p>
        </div>
        <div class="p-6 space-y-12">
            <button onclick="trackLineClick()" class="block w-full line-green text-white text-center font-black py-5 rounded-[2rem] shadow-xl animate-pulse">
                公式LINEで無料相談を開始
            </button>
            <div class="space-y-4">
                <h3 class="text-lg font-black px-2">市場評価の比較</h3>
                <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-slate-100"><div class="chart-container"><canvas id="chartGap"></canvas></div></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-white text-slate-400 font-bold py-4 rounded-[2.5rem] border border-slate-200 text-xs">トップに戻る</button>
        </div>
    </section>
</div>
</body>
</html>
